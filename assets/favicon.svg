<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10151c"/>
      <stop offset="100%" stop-color="#1b2230"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- roda de bicicleta estilizada como engrenagem/circuito -->
  <g stroke="#ff7a3d" stroke-width="3.4" fill="none" stroke-linecap="round">
    <circle cx="32" cy="32" r="17"/>
    <!-- raios em padrão de circuito (4 traços, não 360 graus) -->
    <line x1="32" y1="15" x2="32" y2="24"/>
    <line x1="48.5" y1="32" x2="40" y2="32"/>
    <line x1="32" y1="49" x2="32" y2="40"/>
    <line x1="15.5" y1="32" x2="24" y2="32"/>
  </g>

  <!-- cubo central -->
  <circle cx="32" cy="32" r="4.5" fill="#ff7a3d"/>

  <!-- nodos de circuito nas pontas dos raios -->
  <g fill="#eaf0f7">
    <circle cx="32" cy="14.5" r="2.4"/>
    <circle cx="49.5" cy="32" r="2.4"/>
    <circle cx="32" cy="49.5" r="2.4"/>
    <circle cx="14.5" cy="32" r="2.4"/>
  </g>
</svg>
